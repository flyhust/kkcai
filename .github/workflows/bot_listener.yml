name: Telegram Bot Listener

# DISABLED - bot is running on Railway
# schedule removed to prevent conflict with Railway deployment (409 getUpdates conflict)

on:
  workflow_dispatch:  # manual trigger only

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355      # hard kill just under 6 h

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot listener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          EXA_API_KEY:        ${{ secrets.EXA_API_KEY }}
        # --timeout 20700 = 345 min, exits before the 355-min hard kill
        run: python bot_listener.py --timeout 20700
